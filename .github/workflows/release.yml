name: Release

on:
  push:
    tags:
      - 'release*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for release tag on HEAD
        id: release-tag
        run: |
          tag=$(git tag --points-at HEAD | grep -E '^release' | head -n1 || true)
          if [ -n "$tag" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
            echo "HEAD has release tag: $tag"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No release* tag on HEAD; skipping publish."
          fi

      - name: Setup Node.js
        if: steps.release-tag.outputs.found == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: steps.release-tag.outputs.found == 'true'
        run: npm ci

      - name: Build
        if: steps.release-tag.outputs.found == 'true'
        run: npm run bundle

      - name: Read package metadata
        if: steps.release-tag.outputs.found == 'true'
        id: pkg
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if exact version already on npm
        if: steps.release-tag.outputs.found == 'true'
        id: npm-version
        run: |
          name="${{ steps.pkg.outputs.name }}"
          local_version="${{ steps.pkg.outputs.version }}"
          exact=$(npm view "$name@$local_version" version 2>/dev/null || true)
          echo "Local version:    $local_version"
          echo "Registry lookup:  ${exact:-<not published>}"
          if [ -n "$exact" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Version $local_version already on npm; skipping publish."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Version $local_version not on npm; will publish."
          fi

      - name: Publish package to npm
        if: steps.release-tag.outputs.found == 'true' && steps.npm-version.outputs.should_publish == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
